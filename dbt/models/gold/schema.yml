version: 2

models:
  # ============================================================
  # DIMENSION TABLES
  # ============================================================
  - name: dim_customer
    description: "Customer dimension combining master data with sales area assignments"
    columns:
      - name: CUSTOMER_NUMBER
        description: "Unique customer identifier"

  - name: dim_vendor
    description: "Vendor/supplier dimension with company code and purchasing org"
    columns:
      - name: VENDOR_NUMBER
        description: "Unique vendor identifier"

  - name: dim_material
    description: "Material/product dimension combining general data with plant-level attributes (recipes, raw materials, packaging)"
    columns:
      - name: MATERIAL_NUMBER
        description: "Unique material/product identifier"

  - name: dim_plant
    description: "Manufacturing plant dimension (bakery locations, distribution centers)"
    columns:
      - name: PLANT_CODE
        description: "Plant identifier"
        tests:
          - unique
          - not_null

  - name: dim_cost_center
    description: "Cost center dimension for cost allocation (production lines, departments)"
    columns:
      - name: COST_CENTER
        description: "Cost center code"

  - name: dim_cost_element
    description: "Cost element/GL account dimension for cost classification"
    columns:
      - name: COST_ELEMENT
        description: "Cost element code"

  - name: dim_work_center
    description: "Work center dimension representing production resources (ovens, mixers, packaging lines)"
    columns:
      - name: WORK_CENTER_ID
        description: "Work center identifier"

  - name: dim_sales_document_type
    description: "Sales document type dimension (standard order, returns, free of charge)"
    columns:
      - name: DOCUMENT_TYPE_CODE
        description: "Document type code"

  - name: dim_org_unit
    description: "HR organizational unit dimension (departments, teams, shifts)"
    columns:
      - name: OBJECT_ID
        description: "Organizational object ID"

  - name: dim_bom
    description: "Bill of Materials (recipe) dimension - ingredient breakdown per cookie type"
    columns:
      - name: BOM_NUMBER
        description: "BOM/recipe number"

  - name: dim_warehouse
    description: "Warehouse inventory snapshot with bin-level stock visibility"
    columns:
      - name: QUANT_NUMBER
        description: "Warehouse quant identifier"

  # ============================================================
  # FACT TABLES
  # ============================================================
  - name: fct_sales_order
    description: "Sales order fact at item/schedule line grain. Measures: order value, order quantity, confirmed quantity"
    columns:
      - name: SALES_ORDER_NUMBER
        description: "Sales order document number"
      - name: ITEM_NET_VALUE
        description: "Net value per order item"

  - name: fct_billing
    description: "Billing/invoice fact at item level. Measures: billing quantity, net value per item"
    columns:
      - name: BILLING_DOCUMENT_NUMBER
        description: "Billing document number"
      - name: ITEM_NET_VALUE
        description: "Net revenue per billed item"

  - name: fct_delivery
    description: "Outbound delivery fact at item level. Measures: delivered quantity"
    columns:
      - name: DELIVERY_NUMBER
        description: "Delivery document number"
      - name: DELIVERY_QUANTITY
        description: "Quantity delivered to customer"

  - name: fct_purchase_order
    description: "Purchase order fact at item level. Measures: order quantity, net price, item net value"
    columns:
      - name: PURCHASE_ORDER_NUMBER
        description: "Purchase order number"
      - name: ITEM_NET_VALUE
        description: "Net value of purchased item (ingredients, packaging)"

  - name: fct_goods_movement
    description: "Goods movement fact (receipt, issue, transfer). Measures: quantity, local amount"
    columns:
      - name: DOCUMENT_NUMBER
        description: "Material document number"
      - name: QUANTITY
        description: "Moved quantity"
      - name: LOCAL_AMOUNT
        description: "Value in local currency"

  - name: fct_production_order
    description: "Production order fact with planned quantities. Measures: order quantity"
    columns:
      - name: ORDER_NUMBER
        description: "Production order number"
      - name: ORDER_QUANTITY
        description: "Planned production quantity"

  - name: fct_production_operation
    description: "Production operation fact with actual times and quantities per work center"

  - name: fct_planned_vs_actual_production
    description: "Production planning fact linking orders to component reservations. Measures: planned quantity, component quantity"
    columns:
      - name: ORDER_NUMBER
        description: "Production order number"
      - name: PLANNED_QUANTITY
        description: "Planned output quantity"
      - name: PLANNED_COMPONENT_QTY
        description: "Required component quantity per reservation"

  - name: fct_accounting_document
    description: "Financial posting fact at line item level. Measures: local currency amount, document currency amount"
    columns:
      - name: DOCUMENT_NUMBER
        description: "Accounting document number"
      - name: LOCAL_CURRENCY_AMOUNT
        description: "Amount in local currency"
      - name: DOCUMENT_CURRENCY_AMOUNT
        description: "Amount in document currency"

  - name: fct_co_posting
    description: "Controlling posting fact with cost allocations. Measures: posted amounts by cost element"

  - name: fct_quality_notification
    description: "Quality notification fact for defect tracking and complaints"

  - name: fct_asset_transaction
    description: "Asset transaction fact for capital expenditure tracking. Measures: posted amount"
    columns:
      - name: POSTED_AMOUNT
        description: "Transaction amount posted to asset"

  - name: fct_purchase_order_history
    description: "Purchase order history fact with goods receipts and invoice receipts. Measures: quantities and amounts per GR/IR"
