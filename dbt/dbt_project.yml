name: 'sap-demo'
version: '1.0.0'
config-version: 2

profile: 'sap-demo'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

models:
  sap-demo:
    bronze:
      +materialized: table
      +database: DWH
      +schema: BRONZE
    silver:
      +materialized: table
      +database: DWH
      +schema: SILVER
    gold:
      +materialized: view
      +database: DWH
      +schema: GOLD_DIMENSIONAL
